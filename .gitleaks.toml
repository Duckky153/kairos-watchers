title = "kairos-watchers"

# Defense-in-depth secret scan for the watcher's committed observations. watch.py already runs the
# full gitleaks-class scrub on every excerpt before it is written; this is a SECOND, independent
# gate in the Actions job (see .github/workflows/watch.yml).
[extend]
useDefault = true

# Disable the entropy-based `generic-api-key` rule. It flags ANY high-entropy token — sha256
# content digests, git SHAs, base64 avatars, asset fingerprints — all of which legitimately appear
# in the public developer feeds this watcher polls. Leaving it on made the gate flap: an unattended
# run would fail-closed (and the senses go dark) whenever a feed happened to carry such a string.
# watch.py's scrub deliberately leaves bare high-entropy tokens intact for the same reason, and its
# OWN keyword-anchored generic rule already redacts `api_key = <secret>`-style secrets before they
# reach an observation. The SPECIFIC, prefix/keyword-anchored rules (AKIA / ghp_ / sk-ant- / stripe
# / slack / …) stay ENABLED here as the meaningful defense-in-depth catch. (Pinned by
# tests/test_doors_public_deploy.py.)
disabledRules = ["generic-api-key"]

# Belt-and-suspenders: even with the entropy rule off, allowlist exactly the 64-hex content-hash
# shape (a content_sha256 is a public digest, never a credential) — and NOTHING broader, so a real
# prefix-keyed secret is never exempted.
[allowlist]
description = "sha256 content digests are public content hashes, never credentials"
regexTarget = "match"
regexes = ['''\b[a-f0-9]{64}\b''']
